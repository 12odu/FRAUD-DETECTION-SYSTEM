<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyze Transaction — BFDES</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><svg viewBox="0 0 40 40" fill="none"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" stroke="var(--accent)" stroke-width="2" fill="none"/><polygon points="20,8 32,15 32,25 20,32 8,25 8,15" fill="var(--accent)" opacity="0.15"/><circle cx="20" cy="20" r="4" fill="var(--accent)"/></svg></div>
      <div><div class="brand-name">BFDES</div><div class="brand-sub">Fraud Detection Engine</div></div>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html" class="nav-link"><span class="nav-icon">◈</span>Dashboard</a></li>
      <li><a href="analyze.html" class="nav-link active"><span class="nav-icon">◎</span>Analyze Transaction</a></li>
      <li><a href="knowledgebase.html" class="nav-link"><span class="nav-icon">◫</span>Knowledge Base</a></li>
      <li><a href="cases.html" class="nav-link"><span class="nav-icon">◧</span>Case Queue</a></li>
      <li><a href="profiles.html" class="nav-link"><span class="nav-icon">◉</span>Customer Profiles</a></li>
    </ul>
    <div class="sidebar-status"><div class="status-dot pulse"></div><span>System Online</span></div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Analyze Transaction</h1>
        <span class="page-sub">Run the inference engine on a transaction</span>
      </div>
      <div class="topbar-right">
        <div class="live-badge"><span class="pulse-dot"></span>LIVE</div>
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <!-- FORM -->
    <div class="panel" style="margin:1.5rem 2rem 0">
      <div class="panel-header">
        <span class="panel-title">Transaction Details</span>
        <button class="cta-btn secondary" id="btn-random" style="padding:4px 12px;font-size:10px">⟳ Random Sample</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Customer Account</label>
          <select class="form-select" id="f-customer">
            <option value="">— Select Customer —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Transaction Amount (KES)</label>
          <input class="form-input" id="f-amount" type="number" min="1" placeholder="e.g. 45000" />
        </div>
        <div class="form-group">
          <label class="form-label">Transaction Country (ISO)</label>
          <input class="form-input" id="f-country" type="text" maxlength="2" placeholder="e.g. KE, US, GB" style="text-transform:uppercase" />
        </div>
        <div class="form-group">
          <label class="form-label">Merchant Name</label>
          <input class="form-input" id="f-merchant" type="text" placeholder="e.g. Amazon US" />
        </div>
        <div class="form-group">
          <label class="form-label">Merchant Risk Score (0–10)</label>
          <input class="form-input" id="f-merchant-risk" type="number" min="0" max="10" placeholder="e.g. 3" />
        </div>
        <div class="form-group">
          <label class="form-label">Transactions in Last Hour</label>
          <input class="form-input" id="f-velocity" type="number" min="0" placeholder="e.g. 2" />
        </div>
        <div class="form-group">
          <label class="form-label">Transaction Hour (0–23)</label>
          <input class="form-input" id="f-hour" type="number" min="0" max="23" placeholder="e.g. 14" />
        </div>
        <div class="form-group">
          <label class="form-label">Card Not Present?</label>
          <select class="form-select" id="f-cnp">
            <option value="0">No (card present)</option>
            <option value="1">Yes (online / CNP)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Billing Address Mismatch?</label>
          <select class="form-select" id="f-billing">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">New Merchant (first time)?</label>
          <select class="form-select" id="f-newmerch">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Unknown Device?</label>
          <select class="form-select" id="f-newdevice">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Password Reset in Last 24hr?</label>
          <select class="form-select" id="f-pwreset">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Same Merchant as Prior Chargeback?</label>
          <select class="form-select" id="f-samemerch">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Pre-Approved Large Purchase?</label>
          <select class="form-select" id="f-preapproved">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-group full" style="justify-content:flex-end;flex-direction:row;gap:0.8rem;align-items:flex-end">
          <button class="cta-btn secondary" id="btn-clear">Clear</button>
          <button class="cta-btn primary" id="btn-analyze">▶ Run Inference Engine</button>
        </div>
      </div>
    </div>

    <!-- RESULT -->
    <div id="result-area"></div>

  </main>

  <script src="../js/main.js"></script>
  <script>
  // Populate customer dropdown
  const sel = document.getElementById('f-customer');
  getProfiles().forEach(p => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = `${p.id} — ${p.name}`;
    sel.appendChild(o);
  });

  // Random sample
  const SAMPLES = [
    { amount: 95000, country: 'US', merchant: 'Amazon US', merchant_risk: 2, velocity: 1, hour: 14, cnp: 1, billing: 0, newmerch: 0, newdevice: 0, pwreset: 0, samemerch: 0, preapproved: 0 },
    { amount: 500, country: 'KE', merchant: 'Naivas', merchant_risk: 1, velocity: 12, hour: 3, cnp: 0, billing: 0, newmerch: 0, newdevice: 0, pwreset: 0, samemerch: 0, preapproved: 0 },
    { amount: 250000, country: 'NG', merchant: 'Unknown Vendor', merchant_risk: 9, velocity: 1, hour: 3, cnp: 1, billing: 1, newmerch: 1, newdevice: 1, pwreset: 1, samemerch: 0, preapproved: 0 },
    { amount: 8000, country: 'GB', merchant: 'Zara UK', merchant_risk: 1, velocity: 2, hour: 16, cnp: 0, billing: 0, newmerch: 1, newdevice: 0, pwreset: 0, samemerch: 0, preapproved: 0 },
    { amount: 180000, country: 'KE', merchant: 'KCB ATM', merchant_risk: 0, velocity: 1, hour: 11, cnp: 0, billing: 0, newmerch: 0, newdevice: 0, pwreset: 0, samemerch: 0, preapproved: 1 },
  ];

  document.getElementById('btn-random').onclick = () => {
    const s = SAMPLES[Math.floor(Math.random() * SAMPLES.length)];
    document.getElementById('f-amount').value = s.amount;
    document.getElementById('f-country').value = s.country;
    document.getElementById('f-merchant').value = s.merchant;
    document.getElementById('f-merchant-risk').value = s.merchant_risk;
    document.getElementById('f-velocity').value = s.velocity;
    document.getElementById('f-hour').value = s.hour;
    document.getElementById('f-cnp').value = s.cnp;
    document.getElementById('f-billing').value = s.billing;
    document.getElementById('f-newmerch').value = s.newmerch;
    document.getElementById('f-newdevice').value = s.newdevice;
    document.getElementById('f-pwreset').value = s.pwreset;
    document.getElementById('f-samemerch').value = s.samemerch;
    document.getElementById('f-preapproved').value = s.preapproved;
    // pick matching profile
    const profiles = getProfiles();
    if (s.country === 'GB') {
      sel.value = profiles.find(p => p.travel_flag && p.travel_dest === 'GB')?.id || profiles[0].id;
    } else {
      sel.value = profiles[0].id;
    }
  };

  document.getElementById('btn-clear').onclick = () => {
    document.querySelectorAll('.form-input,.form-select').forEach(el => { el.value = el.tagName === 'SELECT' ? el.options[0].value : ''; });
    document.getElementById('result-area').innerHTML = '';
  };

  document.getElementById('btn-analyze').onclick = () => {
    const profileId = document.getElementById('f-customer').value;
    const amount    = parseFloat(document.getElementById('f-amount').value);
    if (!profileId || !amount) { showToast('Please fill in Customer and Amount fields.', 'error'); return; }
    const profiles  = getProfiles();
    const profile   = profiles.find(p => p.id === profileId);
    const txn = {
      txn_id: 'TXN-' + Math.random().toString(36).substr(2,8).toUpperCase(),
      amount,
      country: (document.getElementById('f-country').value || 'KE').toUpperCase(),
      merchant: document.getElementById('f-merchant').value || 'Unknown',
      merchant_risk: parseInt(document.getElementById('f-merchant-risk').value) || 0,
      velocity_1hr: parseInt(document.getElementById('f-velocity').value) || 0,
      hour: parseInt(document.getElementById('f-hour').value) || new Date().getHours(),
      card_not_present: document.getElementById('f-cnp').value === '1',
      billing_mismatch: document.getElementById('f-billing').value === '1',
      new_merchant: document.getElementById('f-newmerch').value === '1',
      new_device: document.getElementById('f-newdevice').value === '1',
      recent_pw_reset: document.getElementById('f-pwreset').value === '1',
      same_merchant: document.getElementById('f-samemerch').value === '1',
      pre_approved: document.getElementById('f-preapproved').value === '1',
      customer_id: profile.id,
      customer_name: profile.name
    };

    const result = runInference(txn, profile);
    addCase(txn, result);
    renderResult(txn, profile, result);
    showToast('Inference complete — case saved to queue.', 'success');
  };

  function renderResult(txn, profile, result) {
    const colorMap = { approve: 'var(--green)', soft: 'var(--yellow)', hold: 'var(--orange)', decline: 'var(--red)' };
    const color = colorMap[result.cls];
    const scorePercent = (result.score * 100).toFixed(1);

    const firedHTML = result.rules_fired.length ? result.rules_fired.map(r =>
      `<div class="fired-rule"><span class="rule-id">${r.id}</span><span class="rule-desc">${r.action}</span><span class="rule-weight">+${r.weight}</span></div>`
    ).join('') : '<span style="color:var(--text3);font-size:12px">No fraud rules triggered.</span>';

    const mitigHTML = result.mitigating.length ? result.mitigating.map(r =>
      `<div class="fired-rule"><span class="rule-id">${r.id}</span><span class="rule-desc">${r.action}</span><span class="rule-weight" style="color:var(--green)">${r.weight}</span></div>`
    ).join('') : '<span style="color:var(--text3);font-size:12px">None.</span>';

    document.getElementById('result-area').innerHTML = `
      <div class="result-card">
        <div class="result-header ${result.cls}">
          <div>
            <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Decision</div>
            <div class="result-verdict" style="color:${color}">${result.classification}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:4px">${txn.txn_id} · ${profile.name} · ${fmtAmount(txn.amount)} · ${txn.country}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Risk Score</div>
            <div class="result-score" style="color:${color}">${scorePercent}%</div>
          </div>
        </div>
        <div class="result-body">
          <div class="result-section">
            <div class="result-section-title">Rules Fired (${result.rules_fired.length})</div>
            <div class="result-rules">${firedHTML}</div>
          </div>
          <div class="result-section">
            <div class="result-section-title">Mitigating Factors (${result.mitigating.length})</div>
            <div class="result-rules">${mitigHTML}</div>
          </div>
          <div class="result-section">
            <div class="result-section-title">Explanation</div>
            <div class="explanation-text">${result.explanation}</div>
          </div>
          <div class="result-section">
            <div class="result-section-title">Customer Profile Used</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;font-size:11.5px">
              <div style="color:var(--text2)">Home Country: <b style="color:var(--text)">${profile.home_country}</b></div>
              <div style="color:var(--text2)">Avg Transaction: <b style="color:var(--text)">${fmtAmount(profile.avg_txn)}</b></div>
              <div style="color:var(--text2)">Travel Flag: <b style="color:var(--text)">${profile.travel_flag ? 'YES → ' + profile.travel_dest : 'No'}</b></div>
              <div style="color:var(--text2)">Account Age: <b style="color:var(--text)">${profile.account_age_days} days</b></div>
              <div style="color:var(--text2)">Chargebacks (90d): <b style="color:var(--text)">${profile.chargeback_count}</b></div>
              <div style="color:var(--text2)">Known Devices: <b style="color:var(--text)">${profile.known_devices}</b></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }
  </script>
</body>
</html>
