<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Profiles — BFDES</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><svg viewBox="0 0 40 40" fill="none"><polygon points="20,2 38,12 38,28 20,38 2,28 2,12" stroke="var(--accent)" stroke-width="2" fill="none"/><polygon points="20,8 32,15 32,25 20,32 8,25 8,15" fill="var(--accent)" opacity="0.15"/><circle cx="20" cy="20" r="4" fill="var(--accent)"/></svg></div>
      <div><div class="brand-name">BFDES</div><div class="brand-sub">Fraud Detection Engine</div></div>
    </div>
    <ul class="nav-links">
      <li><a href="../index.html" class="nav-link"><span class="nav-icon">◈</span>Dashboard</a></li>
      <li><a href="analyze.html" class="nav-link"><span class="nav-icon">◎</span>Analyze Transaction</a></li>
      <li><a href="knowledgebase.html" class="nav-link"><span class="nav-icon">◫</span>Knowledge Base</a></li>
      <li><a href="cases.html" class="nav-link"><span class="nav-icon">◧</span>Case Queue</a></li>
      <li><a href="profiles.html" class="nav-link active"><span class="nav-icon">◉</span>Customer Profiles</a></li>
    </ul>
    <div class="sidebar-status"><div class="status-dot pulse"></div><span>System Online</span></div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">Customer Profiles</h1>
        <span class="page-sub">Behavioural profile engine — per-customer baselines</span>
      </div>
      <div class="topbar-right">
        <button class="cta-btn primary" id="btn-add-profile" style="font-size:10px;padding:6px 12px">+ Add Profile</button>
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </header>

    <div id="profile-grid" class="profile-grid"></div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="profile-modal">
    <div class="modal">
      <h2 id="pm-title">Add Customer Profile</h2>
      <input type="hidden" id="pm-edit-idx" />
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.8rem">
        <div class="form-group"><label class="form-label">Customer ID</label><input class="form-input" id="pm-id" placeholder="e.g. C005" /></div>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="pm-name" placeholder="e.g. Jane Doe" /></div>
        <div class="form-group"><label class="form-label">Avg Transaction (KES)</label><input class="form-input" id="pm-avg" type="number" placeholder="e.g. 12000" /></div>
        <div class="form-group"><label class="form-label">Home Country (ISO)</label><input class="form-input" id="pm-country" maxlength="2" placeholder="e.g. KE" style="text-transform:uppercase" /></div>
        <div class="form-group"><label class="form-label">Travel Flag Active?</label><select class="form-select" id="pm-travel"><option value="0">No</option><option value="1">Yes</option></select></div>
        <div class="form-group"><label class="form-label">Travel Destination (ISO)</label><input class="form-input" id="pm-dest" maxlength="2" placeholder="e.g. GB" style="text-transform:uppercase" /></div>
        <div class="form-group"><label class="form-label">Velocity Baseline (txns/hr)</label><input class="form-input" id="pm-velocity" type="number" placeholder="e.g. 3" /></div>
        <div class="form-group"><label class="form-label">Known Devices Count</label><input class="form-input" id="pm-devices" type="number" placeholder="e.g. 2" /></div>
        <div class="form-group"><label class="form-label">Account Age (days)</label><input class="form-input" id="pm-age" type="number" placeholder="e.g. 500" /></div>
        <div class="form-group"><label class="form-label">Chargebacks (90d)</label><input class="form-input" id="pm-chargebacks" type="number" placeholder="e.g. 0" /></div>
      </div>
      <div class="modal-actions">
        <button class="cta-btn secondary" id="pm-cancel">Cancel</button>
        <button class="cta-btn primary" id="pm-save">Save Profile</button>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
  function renderProfiles() {
    const profiles = getProfiles();
    const grid = document.getElementById('profile-grid');
    grid.innerHTML = profiles.map((p, i) => `
      <div class="profile-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem">
          <div>
            <div class="profile-name">${p.name}</div>
            <div class="profile-id">${p.id}</div>
          </div>
          <div style="display:flex;gap:0.4rem">
            <button class="edit-btn" onclick="editProfile(${i})">Edit</button>
            <button class="del-btn" onclick="deleteProfile(${i})">Del</button>
          </div>
        </div>
        <div class="profile-stat"><span class="profile-stat-label">Home Country</span><span class="profile-stat-value">${p.home_country}</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Avg Transaction</span><span class="profile-stat-value">${fmtAmount(p.avg_txn)}</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Travel Flag</span><span class="profile-stat-value" style="color:${p.travel_flag ? 'var(--accent)' : 'var(--text3)'}">${p.travel_flag ? 'YES → ' + p.travel_dest : 'None'}</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Velocity Baseline</span><span class="profile-stat-value">${p.velocity_baseline} txns/hr</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Known Devices</span><span class="profile-stat-value">${p.known_devices}</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Account Age</span><span class="profile-stat-value">${p.account_age_days} days</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Chargebacks (90d)</span><span class="profile-stat-value" style="color:${p.chargeback_count > 1 ? 'var(--orange)' : 'var(--text)'}">${p.chargeback_count}</span></div>
      </div>
    `).join('');
  }

  function editProfile(i) {
    const p = getProfiles()[i];
    document.getElementById('pm-title').textContent = 'Edit Profile';
    document.getElementById('pm-edit-idx').value = i;
    document.getElementById('pm-id').value = p.id;
    document.getElementById('pm-name').value = p.name;
    document.getElementById('pm-avg').value = p.avg_txn;
    document.getElementById('pm-country').value = p.home_country;
    document.getElementById('pm-travel').value = p.travel_flag ? '1' : '0';
    document.getElementById('pm-dest').value = p.travel_dest;
    document.getElementById('pm-velocity').value = p.velocity_baseline;
    document.getElementById('pm-devices').value = p.known_devices;
    document.getElementById('pm-age').value = p.account_age_days;
    document.getElementById('pm-chargebacks').value = p.chargeback_count;
    document.getElementById('profile-modal').classList.add('open');
  }

  function deleteProfile(i) {
    const profiles = getProfiles();
    if (!confirm('Delete profile for ' + profiles[i].name + '?')) return;
    profiles.splice(i, 1);
    saveProfiles(profiles);
    showToast('Profile deleted.', 'error');
    renderProfiles();
  }

  document.getElementById('btn-add-profile').onclick = () => {
    document.getElementById('pm-title').textContent = 'Add Customer Profile';
    document.getElementById('pm-edit-idx').value = '';
    ['pm-id','pm-name','pm-avg','pm-country','pm-dest','pm-velocity','pm-devices','pm-age','pm-chargebacks'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('pm-travel').value = '0';
    document.getElementById('profile-modal').classList.add('open');
  };

  document.getElementById('pm-cancel').onclick = () => document.getElementById('profile-modal').classList.remove('open');

  document.getElementById('pm-save').onclick = () => {
    const id = document.getElementById('pm-id').value.trim();
    const name = document.getElementById('pm-name').value.trim();
    const avg_txn = parseFloat(document.getElementById('pm-avg').value);
    if (!id || !name || !avg_txn) { showToast('Fill in ID, Name and Avg Transaction.', 'error'); return; }
    const profile = {
      id, name, avg_txn,
      home_country: document.getElementById('pm-country').value.toUpperCase() || 'KE',
      travel_flag: document.getElementById('pm-travel').value === '1',
      travel_dest: document.getElementById('pm-dest').value.toUpperCase(),
      velocity_baseline: parseInt(document.getElementById('pm-velocity').value) || 3,
      known_devices: parseInt(document.getElementById('pm-devices').value) || 1,
      account_age_days: parseInt(document.getElementById('pm-age').value) || 1,
      chargeback_count: parseInt(document.getElementById('pm-chargebacks').value) || 0,
    };
    const profiles = getProfiles();
    const editIdx = document.getElementById('pm-edit-idx').value;
    if (editIdx !== '') { profiles[parseInt(editIdx)] = profile; showToast('Profile updated.', 'success'); }
    else { profiles.push(profile); showToast('Profile added.', 'success'); }
    saveProfiles(profiles);
    renderProfiles();
    document.getElementById('profile-modal').classList.remove('open');
  };

  renderProfiles();
  </script>
</body>
</html>
